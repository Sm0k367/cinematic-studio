name = "epic-tech-ai-cinematic-studio"
compatibility_date = "2026-05-26"
compatibility_flags = ["nodejs_compat"]

# This tells Wrangler that the entire project is a static site + Functions (single-file mode)
pages_build_output_dir = "."

# ====================== CONFIGURED ======================
# KV namespace: configured with ID c734f05ba19e4797a285e668a2e08b86
#
# R2 bucket "epic-ai-media" must have Public Access enabled
#   (or use a custom domain) for media URLs to work reliably.
#
# AI binding is automatic when Workers AI is enabled on your account.
# ===========================================================

[[kv_namespaces]]
binding = "KV"
id = "c734f05ba19e4797a285e668a2e08b86"

[[r2_buckets]]
binding = "R2"
bucket_name = "epic-ai-media"

[ai]
binding = "AI"

[observability]
enabled = true
