name = "cinematic-studio"
compatibility_date = "2026-05-26"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"

[[r2_buckets]]
binding = "R2"
bucket_name = "epic-ai-media"

[[vectorize]]
binding = "VECTORIZE"
index_name = "character-memory"

[ai]
binding = "AI"

[observability]
enabled = true
