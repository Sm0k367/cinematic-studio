name = "cinematic-ai-studio"
compatibility_date = "2025-05-27"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[ai]
binding = "AI"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "cinematic-ai-media"

# KV and Vectorize are commented out for free plan deployment.
# Uncomment and fill in real IDs once you upgrade or create the resources.
