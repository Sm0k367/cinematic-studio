name: Deploy to Cloudflare Pages

# Deploys to Cloudflare Pages on every push to main, or on demand via the
# "Run workflow" button in the Actions tab.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — https://dash.cloudflare.com/profile/api-tokens
#                            ("Cloudflare Pages — Edit" template)
#   CLOUDFLARE_ACCOUNT_ID  — dash.cloudflare.com → right sidebar → Account ID
#
# Without these the deploy step fails fast with a clear message instead of
# leaking a confusing wrangler error. Add the secrets, then re-run the
# workflow from the Actions tab — no code change needed.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-flight — verify required secrets are configured
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$CF_TOKEN" ]; then
            echo "::error title=Missing secret::CLOUDFLARE_API_TOKEN is not set."
            echo "    Add it under: Settings → Secrets and variables → Actions"
            echo "    Generate one: https://dash.cloudflare.com/profile/api-tokens"
            echo "                  (use the 'Cloudflare Pages — Edit' template)"
            missing=1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error title=Missing secret::CLOUDFLARE_ACCOUNT_ID is not set."
            echo "    Add it under: Settings → Secrets and variables → Actions"
            echo "    Find your Account ID: dash.cloudflare.com → right sidebar"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Once the secrets are added, just re-run this workflow from"
            echo "the Actions tab — no commit needed."
            exit 1
          fi
          echo "✅ Required secrets present."

      - name: Pre-flight — fail loudly on placeholder config
        run: |
          if grep -q "YOUR_KV_NAMESPACE_ID" wrangler.toml; then
            echo "::warning title=Placeholder KV id::wrangler.toml still has YOUR_KV_NAMESPACE_ID."
            echo "    The deploy will succeed but /api/auth and /api/vault will fail at runtime."
          fi
          if grep -q "pub-YOUR-PUB-URL-HERE" wrangler.toml; then
            echo "::warning title=Placeholder R2 URL::wrangler.toml still has pub-YOUR-PUB-URL-HERE."
            echo "    The deploy will succeed but generated images won't load (broken URLs)."
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Explicit Pages deploy — never `wrangler deploy` (that's the Workers command).
          command: pages deploy . --project-name=cinematic-studio --branch=main --commit-dirty=true
          wranglerVersion: "3"

      - name: Summary
        if: success()
        run: |
          echo "### ✅ Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** https://cinematic-studio.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If \`/api/cinematic\` returns errors:" >> $GITHUB_STEP_SUMMARY
          echo "1. Replace \`YOUR_KV_NAMESPACE_ID\` in \`wrangler.toml\` with your real KV id" >> $GITHUB_STEP_SUMMARY
          echo "2. Replace \`pub-YOUR-PUB-URL-HERE.r2.dev\` with your R2 bucket's public URL" >> $GITHUB_STEP_SUMMARY
          echo "3. Commit + push to redeploy" >> $GITHUB_STEP_SUMMARY
