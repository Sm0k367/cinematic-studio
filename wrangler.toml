name = "cinematic-ai-studio"
compatibility_date = "2025-05-27"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[ai]
binding = "AI"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "cinematic-ai-media"

[[kv_namespaces]]
binding = "KV"
id = "your-kv-id-here"   # Replace with your actual KV namespace ID

[[vectorize]]
binding = "MEMORY"
index_name = "cinematic-memory-vault"

[vars]
ENVIRONMENT = "production"
